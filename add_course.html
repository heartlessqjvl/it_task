             <h2>Add New Course</h2>
             <p>Add a new course to manage your learning easily.</p>
         <form>
    <table class="fathy">
      <tr>
        <td>Course Name</td>
        <td><input type="text" name="course_name" required></td>
      </tr>
      <tr>
        <td>Instructor Name</td>
        <td><input type="text" name="instructor_name" required ></td>
      </tr>
      <tr>
        <td>Hours</td>
        <td><input type="number" name="hours" min="1" required ></td>
      </tr>
      <tr>
        <td>Notes</td>
        <td><textarea name="notes"></textarea></td>
      </tr>
    </table>
    <button type="submit">Add Course</button>
         </form>
